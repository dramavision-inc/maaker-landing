<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 手绘图表生成器 — diagrams.maaker.ai</title>
  <meta name="description" content="用 AI 生成 Excalidraw 手绘风格图表：流程图、架构图、时序图、思维导图，支持 Mermaid 导入">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      theme: {
        extend: {
          colors: {
            teal: {
              500: '#14B8A6',
              600: '#0D9488',
              700: '#0F766E',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .doodle-line {
      background-image: url("data:image/svg+xml,%3Csvg width='200' height='8' viewBox='0 0 200 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 5.5C20 2 40 7 60 4C80 1 100 6 120 3.5C140 1 160 6 199 3' stroke='%230D9488' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      height: 8px;
    }

    .cta-btn {
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      transition: all 0.2s ease;
    }
    .cta-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(13, 148, 136, 0.3);
    }
    .cta-btn:active {
      transform: translateY(0);
    }
    .cta-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .type-tab {
      transition: all 0.2s ease;
    }
    .type-tab.active {
      background-color: #0D9488;
      color: white;
      border-color: #0D9488;
    }
    .type-tab:not(.active):hover {
      border-color: #0D9488;
      color: #0D9488;
    }

    .form-input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: #0D9488;
      box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.1);
    }

    textarea.form-input {
      resize: vertical;
      min-height: 120px;
    }

    .add-btn {
      transition: all 0.15s ease;
    }
    .add-btn:hover {
      background-color: #f0fdfa;
    }

    .remove-btn {
      transition: all 0.15s ease;
    }
    .remove-btn:hover {
      background-color: #fef2f2;
      color: #ef4444;
    }

    .try-btn {
      transition: all 0.15s ease;
    }
    .try-btn:hover {
      background-color: #f0fdfa;
      border-color: #0D9488;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-spinner {
      animation: spin 1s linear infinite;
    }

    /* 手绘风格边框 */
    .sketch-border {
      border: 2px dashed #d1d5db;
      border-radius: 1rem;
    }

    /* SVG 预览区自适应 */
    #preview svg {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body class="bg-white text-gray-900">

  <main class="max-w-2xl mx-auto px-6 pb-12">

    <!-- Header -->
    <section class="pt-12 pb-8 text-center">
      <h1 class="text-2xl font-bold tracking-tight mb-2">
        diagrams<span class="text-teal-600">.maaker.ai</span>
      </h1>
      <p class="text-base text-gray-500">
        AI 手绘图表生成器
      </p>
      <p class="text-sm text-gray-400 mt-1">
        输入结构化数据，生成 Excalidraw 手绘风格图表
      </p>
    </section>

    <div class="doodle-line my-4"></div>

    <!-- 图表类型选择 -->
    <section class="py-6">
      <label class="text-sm font-medium text-gray-700 mb-3 block">选择图表类型</label>
      <div class="flex flex-wrap gap-2">
        <button class="type-tab active text-sm px-4 py-2 rounded-full border border-gray-200" data-type="flowchart">流程图</button>
        <button class="type-tab text-sm px-4 py-2 rounded-full border border-gray-200" data-type="architecture">架构图</button>
        <button class="type-tab text-sm px-4 py-2 rounded-full border border-gray-200" data-type="sequence">时序图</button>
        <button class="type-tab text-sm px-4 py-2 rounded-full border border-gray-200" data-type="mindmap">思维导图</button>
        <button class="type-tab text-sm px-4 py-2 rounded-full border border-gray-200" data-type="mermaid">Mermaid 导入</button>
      </div>
    </section>

    <!-- 标题输入（通用） -->
    <section class="pb-4">
      <label class="text-sm font-medium text-gray-700 mb-2 block">图表标题（可选）</label>
      <input type="text" id="title-input" class="form-input" placeholder="给图表起个标题...">
    </section>

    <div class="doodle-line my-2"></div>

    <!-- ============ 流程图表单 ============ -->
    <section id="form-flowchart" class="py-6 form-section">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-medium text-gray-700">流程图配置</h3>
        <button class="try-btn text-xs text-teal-600 border border-teal-200 px-3 py-1 rounded-full" onclick="tryExample('flowchart')">试试这个</button>
      </div>

      <!-- 方向 -->
      <div class="mb-4">
        <label class="text-xs text-gray-500 mb-1 block">方向</label>
        <select id="flow-direction" class="form-input">
          <option value="LR">从左到右 (LR)</option>
          <option value="TB">从上到下 (TB)</option>
        </select>
      </div>

      <!-- 节点 -->
      <div class="mb-4">
        <div class="flex items-center justify-between mb-2">
          <label class="text-xs text-gray-500">节点</label>
          <button class="add-btn text-xs text-teal-600 px-2 py-1 rounded-lg" onclick="addFlowNode()">+ 添加节点</button>
        </div>
        <div id="flow-nodes" class="space-y-2">
          <div class="flex gap-2 items-center flow-node-row">
            <input type="text" class="form-input flex-1" placeholder="节点名称">
            <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
          </div>
          <div class="flex gap-2 items-center flow-node-row">
            <input type="text" class="form-input flex-1" placeholder="节点名称">
            <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
          </div>
        </div>
      </div>

      <!-- 连线 -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="text-xs text-gray-500">连线</label>
          <button class="add-btn text-xs text-teal-600 px-2 py-1 rounded-lg" onclick="addFlowEdge()">+ 添加连线</button>
        </div>
        <div id="flow-edges" class="space-y-2">
          <div class="flex gap-2 items-center flow-edge-row">
            <input type="text" class="form-input flex-1" placeholder="起始节点">
            <span class="text-gray-400 text-sm flex-shrink-0">&rarr;</span>
            <input type="text" class="form-input flex-1" placeholder="目标节点">
            <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ 架构图表单 ============ -->
    <section id="form-architecture" class="py-6 form-section hidden">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-medium text-gray-700">架构图配置</h3>
        <button class="try-btn text-xs text-teal-600 border border-teal-200 px-3 py-1 rounded-full" onclick="tryExample('architecture')">试试这个</button>
      </div>

      <div id="arch-layers" class="space-y-3">
        <div class="arch-layer-row p-3 rounded-xl border border-gray-100 bg-gray-50/50">
          <div class="flex gap-2 items-center mb-2">
            <input type="text" class="form-input flex-1" placeholder="层名称">
            <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
          </div>
          <input type="text" class="form-input" placeholder="组件（逗号分隔，如：React, Vue, Angular）">
        </div>
      </div>
      <button class="add-btn text-xs text-teal-600 px-2 py-1 rounded-lg mt-3" onclick="addArchLayer()">+ 添加层</button>
    </section>

    <!-- ============ 时序图表单 ============ -->
    <section id="form-sequence" class="py-6 form-section hidden">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-medium text-gray-700">时序图配置</h3>
        <button class="try-btn text-xs text-teal-600 border border-teal-200 px-3 py-1 rounded-full" onclick="tryExample('sequence')">试试这个</button>
      </div>

      <!-- 参与者 -->
      <div class="mb-4">
        <div class="flex items-center justify-between mb-2">
          <label class="text-xs text-gray-500">参与者</label>
          <button class="add-btn text-xs text-teal-600 px-2 py-1 rounded-lg" onclick="addSeqParticipant()">+ 添加</button>
        </div>
        <div id="seq-participants" class="space-y-2">
          <div class="flex gap-2 items-center seq-participant-row">
            <input type="text" class="form-input flex-1" placeholder="参与者名称">
            <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
          </div>
          <div class="flex gap-2 items-center seq-participant-row">
            <input type="text" class="form-input flex-1" placeholder="参与者名称">
            <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
          </div>
        </div>
      </div>

      <!-- 消息 -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="text-xs text-gray-500">消息</label>
          <button class="add-btn text-xs text-teal-600 px-2 py-1 rounded-lg" onclick="addSeqMessage()">+ 添加消息</button>
        </div>
        <div id="seq-messages" class="space-y-2">
          <div class="flex gap-2 items-center seq-message-row">
            <input type="text" class="form-input w-24 flex-shrink-0" placeholder="发送方">
            <span class="text-gray-400 text-sm flex-shrink-0">&rarr;</span>
            <input type="text" class="form-input w-24 flex-shrink-0" placeholder="接收方">
            <input type="text" class="form-input flex-1" placeholder="消息内容">
            <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ 思维导图表单 ============ -->
    <section id="form-mindmap" class="py-6 form-section hidden">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-medium text-gray-700">思维导图配置</h3>
        <button class="try-btn text-xs text-teal-600 border border-teal-200 px-3 py-1 rounded-full" onclick="tryExample('mindmap')">试试这个</button>
      </div>

      <div class="mb-4">
        <label class="text-xs text-gray-500 mb-1 block">根节点</label>
        <input type="text" id="mindmap-root" class="form-input" placeholder="中心主题">
      </div>

      <div>
        <label class="text-xs text-gray-500 mb-1 block">层级关系（每行一个，用 &gt; 表示层级）</label>
        <textarea id="mindmap-items" class="form-input" placeholder="示例：&#10;分支A > 子项1&#10;分支A > 子项2&#10;分支B > 子项3&#10;分支B > 子项4"></textarea>
        <p class="text-xs text-gray-400 mt-1">格式：父节点 &gt; 子节点，支持多级嵌套如 A &gt; B &gt; C</p>
      </div>
    </section>

    <!-- ============ Mermaid 导入表单 ============ -->
    <section id="form-mermaid" class="py-6 form-section hidden">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-medium text-gray-700">Mermaid 导入</h3>
        <button class="try-btn text-xs text-teal-600 border border-teal-200 px-3 py-1 rounded-full" onclick="tryExample('mermaid')">试试这个</button>
      </div>

      <div>
        <label class="text-xs text-gray-500 mb-1 block">Mermaid 代码</label>
        <textarea id="mermaid-code" class="form-input" style="min-height: 200px; font-family: monospace; font-size: 13px;" placeholder="粘贴 Mermaid 代码，例如：&#10;graph LR&#10;    A[开始] --> B[处理]&#10;    B --> C[结束]"></textarea>
      </div>
    </section>

    <!-- 生成按钮 -->
    <section class="py-4">
      <button id="generate-btn" class="cta-btn w-full text-white text-sm font-medium py-3 rounded-full flex items-center justify-center gap-2" onclick="generateDiagram()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
        </svg>
        生成图表
      </button>
    </section>

    <!-- 错误提示 -->
    <div id="error-msg" class="hidden text-sm text-red-500 bg-red-50 border border-red-100 rounded-xl p-4 mb-4"></div>

    <div class="doodle-line my-4"></div>

    <!-- SVG 预览区 -->
    <section class="py-6">
      <h3 class="text-sm font-medium text-gray-700 mb-3">预览</h3>
      <div id="preview" class="sketch-border min-h-[200px] p-4 flex items-center justify-center">
        <p class="text-sm text-gray-300">生成后的图表将显示在这里</p>
      </div>
    </section>

    <!-- 下载按钮 -->
    <section id="download-section" class="pb-6 hidden">
      <div class="flex gap-3">
        <button class="flex-1 text-sm font-medium py-2.5 rounded-full border-2 border-teal-600 text-teal-600 hover:bg-teal-50 transition-colors flex items-center justify-center gap-2" onclick="downloadExcalidraw()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V15"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          下载 .excalidraw
        </button>
        <button class="flex-1 text-sm font-medium py-2.5 rounded-full border-2 border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors flex items-center justify-center gap-2" onclick="downloadSvg()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V15"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          下载 SVG
        </button>
      </div>
    </section>

    <div class="doodle-line my-4"></div>

    <!-- Footer -->
    <footer class="py-8 text-center text-xs text-gray-300">
      <p>Powered by <a href="https://maaker.ai" class="text-teal-500 hover:underline">Maaker.AI</a></p>
    </footer>
  </main>

  <script>
    // ============================================================
    // 配置
    // ============================================================
    const API_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:8000'
      : 'https://api.maaker.cn/diagrams';
    let currentType = "flowchart";

    // ============================================================
    // 类型切换
    // ============================================================
    document.querySelectorAll('.type-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        // 更新 tab 状态
        document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // 切换表单
        currentType = tab.dataset.type;
        document.querySelectorAll('.form-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('form-' + currentType).classList.remove('hidden');
      });
    });

    // ============================================================
    // 通用：删除行
    // ============================================================
    function removeRow(btn) {
      const row = btn.closest('[class*="-row"]');
      if (row && row.parentElement.children.length > 1) {
        row.remove();
      }
    }

    // ============================================================
    // 流程图：添加节点/连线
    // ============================================================
    function addFlowNode() {
      const container = document.getElementById('flow-nodes');
      const div = document.createElement('div');
      div.className = 'flex gap-2 items-center flow-node-row';
      div.innerHTML = `
        <input type="text" class="form-input flex-1" placeholder="节点名称">
        <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
      `;
      container.appendChild(div);
    }

    function addFlowEdge() {
      const container = document.getElementById('flow-edges');
      const div = document.createElement('div');
      div.className = 'flex gap-2 items-center flow-edge-row';
      div.innerHTML = `
        <input type="text" class="form-input flex-1" placeholder="起始节点">
        <span class="text-gray-400 text-sm flex-shrink-0">&rarr;</span>
        <input type="text" class="form-input flex-1" placeholder="目标节点">
        <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
      `;
      container.appendChild(div);
    }

    // ============================================================
    // 架构图：添加层
    // ============================================================
    function addArchLayer() {
      const container = document.getElementById('arch-layers');
      const div = document.createElement('div');
      div.className = 'arch-layer-row p-3 rounded-xl border border-gray-100 bg-gray-50/50';
      div.innerHTML = `
        <div class="flex gap-2 items-center mb-2">
          <input type="text" class="form-input flex-1" placeholder="层名称">
          <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
        </div>
        <input type="text" class="form-input" placeholder="组件（逗号分隔，如：React, Vue, Angular）">
      `;
      container.appendChild(div);
    }

    // ============================================================
    // 时序图：添加参与者/消息
    // ============================================================
    function addSeqParticipant() {
      const container = document.getElementById('seq-participants');
      const div = document.createElement('div');
      div.className = 'flex gap-2 items-center seq-participant-row';
      div.innerHTML = `
        <input type="text" class="form-input flex-1" placeholder="参与者名称">
        <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
      `;
      container.appendChild(div);
    }

    function addSeqMessage() {
      const container = document.getElementById('seq-messages');
      const div = document.createElement('div');
      div.className = 'flex gap-2 items-center seq-message-row';
      div.innerHTML = `
        <input type="text" class="form-input w-24 flex-shrink-0" placeholder="发送方">
        <span class="text-gray-400 text-sm flex-shrink-0">&rarr;</span>
        <input type="text" class="form-input w-24 flex-shrink-0" placeholder="接收方">
        <input type="text" class="form-input flex-1" placeholder="消息内容">
        <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
      `;
      container.appendChild(div);
    }

    // ============================================================
    // 表单数据收集
    // ============================================================
    function collectFormData(type) {
      switch (type) {
        case 'flowchart': {
          const nodes = [];
          document.querySelectorAll('.flow-node-row input').forEach(input => {
            const val = input.value.trim();
            if (val) nodes.push(val);
          });
          const edges = [];
          document.querySelectorAll('.flow-edge-row').forEach(row => {
            const inputs = row.querySelectorAll('input');
            const from = inputs[0].value.trim();
            const to = inputs[1].value.trim();
            if (from && to) edges.push({ from, to });
          });
          const direction = document.getElementById('flow-direction').value;
          return { nodes, edges, direction };
        }

        case 'architecture': {
          const layers = [];
          document.querySelectorAll('.arch-layer-row').forEach(row => {
            const inputs = row.querySelectorAll('input');
            const name = inputs[0].value.trim();
            const componentsStr = inputs[1].value.trim();
            if (name) {
              const components = componentsStr ? componentsStr.split(',').map(s => s.trim()).filter(Boolean) : [];
              layers.push({ name, components });
            }
          });
          return { layers };
        }

        case 'sequence': {
          const participants = [];
          document.querySelectorAll('.seq-participant-row input').forEach(input => {
            const val = input.value.trim();
            if (val) participants.push(val);
          });
          const messages = [];
          document.querySelectorAll('.seq-message-row').forEach(row => {
            const inputs = row.querySelectorAll('input');
            const from = inputs[0].value.trim();
            const to = inputs[1].value.trim();
            const message = inputs[2].value.trim();
            if (from && to && message) messages.push({ from, to, message });
          });
          return { participants, messages };
        }

        case 'mindmap': {
          const root = document.getElementById('mindmap-root').value.trim();
          const itemsText = document.getElementById('mindmap-items').value.trim();
          const items = itemsText ? itemsText.split('\n').map(line => line.trim()).filter(Boolean) : [];
          return { root, items };
        }

        case 'mermaid': {
          const code = document.getElementById('mermaid-code').value.trim();
          return { code };
        }

        default:
          return {};
      }
    }

    // ============================================================
    // 生成图表
    // ============================================================
    async function generateDiagram() {
      const type = currentType;
      const data = collectFormData(type);
      const title = document.getElementById('title-input').value.trim() || undefined;

      // 基础校验
      if (type === 'flowchart' && (!data.nodes || data.nodes.length === 0)) {
        showError('请至少添加一个节点');
        return;
      }
      if (type === 'architecture' && (!data.layers || data.layers.length === 0)) {
        showError('请至少添加一个层');
        return;
      }
      if (type === 'sequence' && (!data.participants || data.participants.length === 0)) {
        showError('请至少添加一个参与者');
        return;
      }
      if (type === 'mindmap' && !data.root) {
        showError('请输入根节点');
        return;
      }
      if (type === 'mermaid' && !data.code) {
        showError('请粘贴 Mermaid 代码');
        return;
      }

      hideError();
      showLoading();

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 60000);

      try {
        const res = await fetch(`${API_URL}/api/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type, data, title }),
          signal: controller.signal,
        });
        clearTimeout(timeout);

        hideLoading();

        if (!res.ok) {
          let errMsg = '生成失败，请重试';
          try {
            const errData = await res.json();
            errMsg = errData.detail || errData.message || errMsg;
          } catch { errMsg = await res.text() || errMsg; }
          showError(errMsg);
          return;
        }

        const result = await res.json();

        // 净化 SVG 防止 XSS
        const preview = document.getElementById('preview');
        const parser = new DOMParser();
        const svgDoc = parser.parseFromString(result.svg, 'image/svg+xml');
        svgDoc.querySelectorAll('script').forEach(el => el.remove());
        svgDoc.querySelectorAll('*').forEach(el => {
          [...el.attributes].forEach(attr => {
            if (attr.name.startsWith('on')) el.removeAttribute(attr.name);
          });
        });
        preview.innerHTML = '';
        preview.appendChild(document.importNode(svgDoc.documentElement, true));

        // 显示下载按钮
        document.getElementById('download-section').classList.remove('hidden');

        // 保存结果
        window._lastResult = result;

      } catch (err) {
        clearTimeout(timeout);
        hideLoading();
        if (err.name === 'AbortError') {
          showError('请求超时（60秒），请重试');
        } else {
          showError('网络错误，请检查连接后重试');
        }
      }
    }

    // ============================================================
    // Loading 状态
    // ============================================================
    function showLoading() {
      const btn = document.getElementById('generate-btn');
      btn.disabled = true;
      btn.innerHTML = `
        <svg class="loading-spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2V6M12 18V22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12H6M18 12H22M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"/>
        </svg>
        生成中...
      `;
    }

    function hideLoading() {
      const btn = document.getElementById('generate-btn');
      btn.disabled = false;
      btn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
        </svg>
        生成图表
      `;
    }

    // ============================================================
    // 错误处理
    // ============================================================
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('error-msg').classList.add('hidden');
    }

    // ============================================================
    // 下载
    // ============================================================
    function downloadExcalidraw() {
      if (!window._lastResult || !window._lastResult.excalidraw) return;
      const blob = new Blob([JSON.stringify(window._lastResult.excalidraw, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'diagram.excalidraw';
      a.click();
      URL.revokeObjectURL(url);
    }

    function downloadSvg() {
      if (!window._lastResult || !window._lastResult.svg) return;
      const blob = new Blob([window._lastResult.svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'diagram.svg';
      a.click();
      URL.revokeObjectURL(url);
    }

    // ============================================================
    // 示例数据 - "试试这个"
    // ============================================================
    function tryExample(type) {
      switch (type) {
        case 'flowchart':
          fillFlowchartExample();
          break;
        case 'architecture':
          fillArchitectureExample();
          break;
        case 'sequence':
          fillSequenceExample();
          break;
        case 'mindmap':
          fillMindmapExample();
          break;
        case 'mermaid':
          fillMermaidExample();
          break;
      }
      // 自动触发生成
      generateDiagram();
    }

    function fillFlowchartExample() {
      // 清空并填入节点
      const nodesContainer = document.getElementById('flow-nodes');
      nodesContainer.innerHTML = '';
      const nodeNames = ['用户请求', 'API处理', '返回结果'];
      nodeNames.forEach(name => {
        const div = document.createElement('div');
        div.className = 'flex gap-2 items-center flow-node-row';
        div.innerHTML = `
          <input type="text" class="form-input flex-1" placeholder="节点名称" value="${name}">
          <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
        `;
        nodesContainer.appendChild(div);
      });

      // 清空并填入连线
      const edgesContainer = document.getElementById('flow-edges');
      edgesContainer.innerHTML = '';
      const edges = [
        { from: '用户请求', to: 'API处理' },
        { from: 'API处理', to: '返回结果' },
      ];
      edges.forEach(edge => {
        const div = document.createElement('div');
        div.className = 'flex gap-2 items-center flow-edge-row';
        div.innerHTML = `
          <input type="text" class="form-input flex-1" placeholder="起始节点" value="${edge.from}">
          <span class="text-gray-400 text-sm flex-shrink-0">&rarr;</span>
          <input type="text" class="form-input flex-1" placeholder="目标节点" value="${edge.to}">
          <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
        `;
        edgesContainer.appendChild(div);
      });

      document.getElementById('flow-direction').value = 'LR';
      document.getElementById('title-input').value = '用户请求处理流程';
    }

    function fillArchitectureExample() {
      const container = document.getElementById('arch-layers');
      container.innerHTML = '';
      const layers = [
        { name: '前端', components: 'React, Tailwind CSS, Vite' },
        { name: '后端', components: 'Node.js, Express, REST API' },
        { name: '数据', components: 'PostgreSQL, Redis, S3' },

      layers.forEach(layer => {
        const div = document.createElement('div');
        div.className = 'arch-layer-row p-3 rounded-xl border border-gray-100 bg-gray-50/50';
        div.innerHTML = `
          <div class="flex gap-2 items-center mb-2">
            <input type="text" class="form-input flex-1" placeholder="层名称" value="${layer.name}">
            <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
          </div>
          <input type="text" class="form-input" placeholder="组件（逗号分隔）" value="${layer.components}">
        `;
        container.appendChild(div);
      });
      document.getElementById('title-input').value = 'Web 应用架构';
    }

    function fillSequenceExample() {
      // 参与者
      const pContainer = document.getElementById('seq-participants');
      pContainer.innerHTML = '';
      const participants = ['用户', '前端', '后端'];
      participants.forEach(name => {
        const div = document.createElement('div');
        div.className = 'flex gap-2 items-center seq-participant-row';
        div.innerHTML = `

          <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
        `;
        pContainer.appendChild(div);

      // 消息
      const mContainer = document.getElementById('seq-messages');

      const messages = [
        { from: '用户', to: '前端', message: '点击登录按钮' },
        { from: '前端', to: '后端', message: 'POST /api/login' },
        { from: '后端', to: '前端', message: '返回 JWT Token' },
        { from: '前端', to: '用户', message: '跳转到首页' },

      messages.forEach(msg => {

        div.className = 'flex gap-2 items-center seq-message-row';
        div.innerHTML = `
          <input type="text" class="form-input w-24 flex-shrink-0" placeholder="发送方" value="${msg.from}">
          <span class="text-gray-400 text-sm flex-shrink-0">&rarr;</span>
          <input type="text" class="form-input w-24 flex-shrink-0" placeholder="接收方" value="${msg.to}">
          <input type="text" class="form-input flex-1" placeholder="消息内容" value="${msg.message}">
          <button class="remove-btn text-gray-400 px-2 py-1 rounded-lg text-sm" onclick="removeRow(this)">&times;</button>
        `;
        mContainer.appendChild(div);

      document.getElementById('title-input').value = '用户登录时序图';
